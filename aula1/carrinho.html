<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja do Marco - Carrinho</title>
    <link rel="stylesheet" href="carrinho.css">
</head>
<body>

    <h1>Carrinho de compras</h1>
    <div class="content">

    <table>
        <tr>
            <th>Foto</th>
            <th>Nome Produto</th>
            <th>Preço un.</th>
            <th>Quantidade</th>
            <th>Total</th>
        </tr>
        <tr>
            <td>
                <img src="https://picsum.photos/100/100" alt="Produto X">
            </td>
            <td>
                Produto X <br/>
                <span>SKU: 342432</span>
            </td>
            <td>R$7,50</td>
            <td>4</td>
            <td>R$30,00</td>
        </tr>
        <tr>
            <td>
                <img src="https://picsum.photos/100/100?random=3" alt="Produto Y">
            </td>
            <td>
                Produto Y <br/>
                <span>SKU: 98956</span>
            </td>
            <td>R$12,00</td>
            <td>1</td>
            <td>R$12,00</td>
        </tr>
        <tr>
            <td>
                <img src="https://picsum.photos/100/100?random=2" alt="Produto Z">
            </td>
            <td>
                Produto Z <br/>
                <span>SKU: 12345643</span>
            </td>
            <td>R$57,50</td>
            <td>2</td>
            <td>R$115,00</td>
        </tr>
        <tr id="last-line">
            <td colspan="4">Total:</td>
            <td>R$157,00</td>
        </tr>
    </table>

    <a id="comprar" href="#">Ir para Pagamento</a>
    </div>

    
</body>
</html>
